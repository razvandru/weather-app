apiVersion: v1
kind: Secret
metadata:
  name: openweathermap-api-key
type: Opaque
stringData:
  apiKey: "API_KEY_PLACEHOLDER" # This will be replaced by the pipeline
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: weather-app
  template:
    metadata:
      labels:
        app: weather-app
    spec:
      containers:
      - name: weather-app
        image: IMAGE_PLACEHOLDER # This will be replaced by the pipeline
        ports:
        - containerPort: 8080
        env:
        - name: OPENWEATHERMAP_API_KEY
          valueFrom:
            secretKeyRef:
              name: openweathermap-api-key
              key: apiKey
---
apiVersion: v1
kind: Service
metadata:
  name: weather-app-service
spec:
  selector:
    app: weather-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: LoadBalancer
