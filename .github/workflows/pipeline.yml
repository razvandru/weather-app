name: Build and Deploy Weather App

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'TST'
        type: choice
        options:
          - TST

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Run unit tests
        run: mvn test

      - name: Build Docker image
        run: docker build -t weather-app:latest .

      - name: Save Docker image
        run: docker save weather-app:latest -o weather-app.tar

      - name: Upload Docker image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: weather-app-image
          path: weather-app.tar

  scan-and-push:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: 'read'
      id-token: 'write'
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: weather-app-image

      - name: Load Docker image
        run: docker load -i weather-app.tar

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'weather-app:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use Google Cloud credentials
        run: gcloud auth configure-docker europe-central2-docker.pkg.dev

      - name: Tag and Push Docker image
        run: |
          docker tag weather-app:latest europe-central2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/weather-app/weather-app:${{ github.sha }}
          docker push europe-central2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/weather-app/weather-app:${{ github.sha }}

  provision-infrastructure:
    runs-on: ubuntu-latest
    needs: scan-and-push
    permissions:
      contents: 'read'
      id-token: 'write'
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        working-directory: ./terraform-gcp
        run: terraform init -backend-config="bucket=${{ secrets.GCS_BUCKET_NAME }}"

      - name: Terraform Apply
        working-directory: ./terraform-gcp
        run: terraform apply -auto-approve -var="gcp_project_id=${{ secrets.GCP_PROJECT_ID }}"

  deploy-application:
    runs-on: ubuntu-latest
    needs: provision-infrastructure
    permissions:
      contents: 'read'
      id-token: 'write'
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK and install auth plugin
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'gke-gcloud-auth-plugin'

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials weather-app-gke --region europe-central2

      - name: Update deployment manifest
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|europe-central2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/weather-app/weather-app:${{ github.sha }}|g" k8s/deployment.yaml
          sed -i "s|API_KEY_PLACEHOLDER|${{ secrets.OPENWEATHERMAP_API_KEY }}|g" k8s/deployment.yaml

      - name: Deploy to GKE
        run: kubectl apply -f k8s/deployment.yaml
